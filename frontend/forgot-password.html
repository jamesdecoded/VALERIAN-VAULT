<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — VALERIAN VAULT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-background"></div>
        
        <div class="auth-content">
            <div class="auth-header">
                <h1 class="auth-logo">VALERIAN VAULT</h1>
                <p class="auth-tagline">Global Fashion. Nairobi Energy.</p>
            </div>

            <div class="auth-card">
                <!-- Email Verification Form -->
                <form class="auth-form active" id="emailForm">
                    <h2>Reset Password</h2>
                    <p class="auth-subtitle">Enter your email to reset your password</p>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" id="resetEmail" required placeholder="your@email.com">
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">Continue</button>

                    <p class="auth-footer">
                        Remember your password? <a href="login.html" class="auth-link">Sign in</a>
                    </p>
                </form>

                <!-- Password Reset Form (Hidden Initially) -->
                <form class="auth-form" id="resetForm" style="display: none;">
                    <h2>Create New Password</h2>
                    <p class="auth-subtitle">Enter your new password</p>

                    <div class="form-group">
                        <label>New Password</label>
                        <div class="password-input">
                            <input type="password" name="newPassword" id="newPassword" required placeholder="Enter new password">
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <div class="password-input">
                            <input type="password" name="confirmNewPassword" id="confirmNewPassword" required placeholder="Confirm new password">
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword')">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">Reset Password</button>
                </form>
            </div>

            <div class="auth-features">
                <div class="feature-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>Secure Authentication</span>
                </div>
                <div class="feature-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span>Data Protection</span>
                </div>
                <div class="feature-item">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span>Verified Accounts</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/forgot-password.js"></script>
</body>
</html>
